<div class="container ms-4 mt-5 d-flex flex-column">
    <h1 class="text-dark-blue-medium mb-5">Доходы и расходы</h1>
    <div class="row mb-5">
        <div class="d-flex gap-2 mb-4 font-roboto-medium">
            <button class="btn btn-success">Создать доход</button>
            <button class="btn btn-danger">Создать расход</button>
        </div>
        <div class="d-flex gap-3 align-items-center font-roboto-medium">
            <div class="btn btn-secondary py-1 px-3 width-100">Сегодня</div>
            <div class="btn btn-outline-secondary py-1 px-3 width-100">Неделя</div>
            <div class="btn btn-outline-secondary py-1 px-3 width-100">Месяц</div>
            <div class="btn btn-outline-secondary py-1 px-3 width-100">Год</div>
            <div class="btn btn-outline-secondary py-1 px-3 width-100">Все</div>
            <div class="btn btn-outline-secondary py-1 px-3 width-100">Интервал</div>
            с <span class="text-secondary outline-secondary">Дата</span> по <span
                class="text-secondary outline-secondary">Дата</span>
        </div>
    </div>

    <table class="table text-center">
        <thead>
        <tr class="border-top">
            <th scope="col" class="text-dark-blue-bold">№ операции</th>
            <th scope="col" class="text-dark-blue-bold">Тип</th>
            <th scope="col" class="text-dark-blue-bold">Категория</th>
            <th scope="col" class="text-dark-blue-bold">Сумма</th>
            <th scope="col" class="text-dark-blue-bold">Дата</th>
            <th scope="col" class="text-dark-blue-bold">Комментарий</th>
            <th scope="col" class="text-dark-blue-bold"></th>
        </tr>
        </thead>
        <tbody class="font-roboto">
        <tr class="">
            <th scope="row" class="font-roboto-bold">1</th>
            <td class="text-success">доход</td>
            <td>зарплата</td>
            <td>500$</td>
            <td>11.09.2022</td>
            <td></td>
            <td>
                <i class="bi bi-pencil me-2 cursor-pointer"></i>
                <i class="bi bi-trash cursor-pointer"  data-bs-toggle="modal" data-bs-target="#deleteModal"></i>
            </td>
        </tr>
        <tr>
            <th scope="row" class="font-roboto-bold">2</th>
            <td class="text-danger">расход</td>
            <td>жильё</td>
            <td>2 500$</td>
            <td>12.09.2022</td>
            <td></td>
            <td>
                <i class="bi bi-pencil me-2 cursor-pointer"></i>
                <i class="bi bi-trash cursor-pointer" data-bs-toggle="modal" data-bs-target="#deleteModal"></i>
            </td>
        </tr>
        </tbody>
    </table>
</div>

<div class="modal fade" id="deleteModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content py-3">
            <div class="modal-body text-center">
                <p class="custom-card-title-text fs-5 mb-3">Вы действительно хотите удалить операцию?</p>
                <button type="button" class="btn btn-success me-2" data-bs-dismiss="modal" id="delete-btn">Да, удалить
                </button>
                <button type="button" class="btn btn-danger" data-bs-dismiss="modal">Не удалять</button>
            </div>
        </div>
    </div>
</div>
