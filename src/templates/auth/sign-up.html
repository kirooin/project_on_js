<div class="container d-flex align-items-center justify-content-center" style="min-height: 100vh;">
    <div class=" border-0" style="width: 450px;">
        <div class="card-body p-5">
            <div class="text-center mb-1">
                <img src="/static/sign-up_login_logo.png" alt="" class="logo mb-5" style="width: 171px; height: 70px" >
                <h2 class="mt-3 text-dark-blue-medium fs-1 mb-3">Создайте аккаунт</h2>
            </div>
            <div id="common-error" class="error invalid-feedback text-center mb-3">Не удалось зарегистрировать
                пользователя. Обратитесь в поддержку
            </div>
            <form class="">
                <div class="mb-2">
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-person"></i></span>
                        <input id="name" type="text" class="form-control" placeholder="Имя">
                        <span id="email-name" class="error invalid-feedback">Введите ваше имя</span>
                    </div>
                </div>
                <div class="mb-2">
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-person"></i></span>
                        <input id="last-name" type="text" class="form-control" placeholder="Фамилия">
                        <span id="last-name-error" class="error invalid-feedback">Введите вашу фамилию</span>
                    </div>
                </div>

                <div class="mb-2">
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                        <input id="email" type="email" class="form-control" placeholder="Электронная почта">
                        <span id="email-error" class="error invalid-feedback">Введите ваше почту</span>
                    </div>
                </div>

                <div class="mb-2">
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-lock"></i></span>
                        <input id="password" type="password" class="form-control" placeholder="Пароль">
                        <span id="password-error" class="error invalid-feedback">Введите ваш пароль</span>
                    </div>
                </div>

                <div class="mb-3">
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-lock"></i></span>
                        <input id="password-repeat" type="password" class="form-control" placeholder="Подтверждение пароля">
                        <span id="password-repeat-error" class="error invalid-feedback">Пароли не совпадают</span>
                    </div>
                </div>

                <button id="process-button" type="button" class="btn btn-primary w-100 py-2 mb-3">
                        Войти
                </button>

                <p class="text-center mb-0 font-roboto fs-12">
                    Уже есть аккаунт? <a href="/#/login" class="text-primary ms-2">Войдите в систему</a>
                </p>
            </form>
        </div>
    </div>
</div>
